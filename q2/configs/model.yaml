# Model architecture
model:
  input_dim: 80          # mel filterbank bins
  content_dim: 256       # content encoder output dimension
  speaker_dim: 128       # speaker encoder output dimension
  decoder_hidden: 512    # decoder hidden dimension
  n_speakers: 100        # number of speakers in dataset

# Loss weights
loss:
  lambda_dis: 0.1        # disentanglement loss weight
  lambda_cls: 1.0        # speaker classification loss weight

# Training
training:
  lr: 0.0001
  batch_size: 32
  n_epochs: 50
  dataset: "librispeech"  # "librispeech" or "voxceleb"
  data_dir: "data/librispeech"
  checkpoint_dir: "q2/checkpoints"
  log_interval: 10
  val_interval: 5

# Evaluation
evaluation:
  checkpoint_path: "q2/checkpoints/best_model.pt"
  results_dir: "q2/results"
  far: 0.01              # fixed FAR for TAR@FAR metric
